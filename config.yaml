# DeepSeek Chat Backup Configuration

# Backup storage directory
backup_dir: ~/deepseek-backups

# DeepSeek URL
deepseek_url: https://chat.deepseek.com

# Export formats
export_formats:
  - markdown
  - word
  - json
  - html

# PII desensitization (phone, email, ID card, bank card, IP, API keys)
pii_desensitize: false

# Rate limiting (seconds between requests)
rate_limit_seconds: 2.0

# Word document settings
word:
  font_name: "Arial"
  font_size: 11

# Markdown settings
markdown:
  include_timestamps: true
